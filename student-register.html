<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>إنشاء حساب طالب</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap"
    rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cairo',sans-serif;
    }

    body{
      background:
      radial-gradient(circle at top right,#0ea5e955,transparent 30%),
      radial-gradient(circle at bottom left,#9333ea55,transparent 30%),
      #0f172a;

      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
      color:white;
    }

    .register-box{
      width:100%;
      max-width:500px;
      background:rgba(17,24,39,.9);
      padding:40px;
      border-radius:30px;
      text-align:center;
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(15px);
      box-shadow:0 25px 50px rgba(0,0,0,.5);
    }

    h1{
      color:#38bdf8;
      margin-bottom:15px;
      font-size:38px;
    }

    p{
      color:#cbd5e1;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:15px;
      margin:12px 0;
      border:none;
      border-radius:12px;
      background:#1e293b;
      color:white;
      font-size:16px;
      outline:none;
      transition:.3s;
    }

    input:focus{
      border:1px solid #38bdf8;
      box-shadow:0 0 15px rgba(56,189,248,.3);
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#38bdf8;
      color:black;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      margin-top:20px;
      transition:.3s;
    }

    button:hover{
      transform:translateY(-4px);
      box-shadow:0 15px 25px rgba(56,189,248,.4);
    }

    .back{
      display:inline-block;
      margin-top:20px;
      color:#cbd5e1;
      text-decoration:none;
      transition:.3s;
    }

    .back:hover{
      color:#38bdf8;
    }

    @media(max-width:768px){

      .register-box{
        padding:30px 25px;
      }

      h1{
        font-size:30px;
      }
    }

  </style>

</head>

<body>

  <div class="register-box">

    <h1>📝 إنشاء حساب</h1>

    <p>
      قم بإنشاء حساب جديد للوصول إلى نظام المكتبة
    </p>

    <!-- NAME -->

    <input
    type="text"
    id="name"
    placeholder="الاسم الكامل">

    <!-- EMAIL -->

    <input
    type="email"
    id="email"
    placeholder="الإيميل الجامعي">

    <!-- STUDENT ID -->

    <input
    type="text"
    id="studentId"
    placeholder="رقم الطالب">

    <!-- PASSWORD -->

    <input
    type="password"
    id="password"
    placeholder="كلمة المرور">

    <!-- CONFIRM PASSWORD -->

    <input
    type="password"
    id="confirmPassword"
    placeholder="تأكيد كلمة المرور">

    <!-- BUTTON -->

    <button onclick="registerStudent()">
      إنشاء الحساب
    </button>

    <!-- BACK -->

    <a href="student_login.html" class="back">
      ← العودة لتسجيل الدخول
    </a>

  </div>





  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getAuth,
      createUserWithEmailAndPassword
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    import {
      getFirestore,
      setDoc,
      doc
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";


    // FIREBASE CONFIG

    const firebaseConfig = {

      apiKey: "AIzaSyCkCR-nUCHQYRiLILTdSzCeYn2CTB94ILQ",

      authDomain: "laib-64c9b.firebaseapp.com",

      projectId: "laib-64c9b",

      storageBucket: "laib-64c9b.firebasestorage.app",

      messagingSenderId: "429556863392",

      appId: "1:429556863392:web:1cffe618fd87b6606914c5"
    };


    // INITIALIZE

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    const db = getFirestore(app);


    // REGISTER FUNCTION

    window.registerStudent = async function(){

      const name =
      document.getElementById('name').value;

      const email =
      document.getElementById('email').value;

      const studentId =
      document.getElementById('studentId').value;

      const password =
      document.getElementById('password').value;

      const confirmPassword =
      document.getElementById('confirmPassword').value;


      // CHECK EMPTY FIELDS

      if(
        !name ||
        !email ||
        !studentId ||
        !password ||
        !confirmPassword
      ){

        alert("يرجى تعبئة جميع الحقول");
        return;
      }


      // CHECK PASSWORDS

      if(password !== confirmPassword){

        alert("كلمتا المرور غير متطابقتين");
        return;
      }


      try{

        // CREATE ACCOUNT

        const userCredential =
        await createUserWithEmailAndPassword(
          auth,
          email,
          password
        );

        const user = userCredential.user;


        // SAVE DATA IN FIRESTORE

        await setDoc(
          doc(db,"students",user.uid),
          {

            name:name,
            email:email,
            studentId:studentId,
            uid:user.uid

          }
        );


        alert("تم إنشاء الحساب بنجاح ✅");


        // REDIRECT

        window.location.href =
        "student_login.html";

      }

      catch(error){

        alert(error.message);
      }
    }

  </script>
</body>
</html>
