<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>دخول الطالب</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top right, #0ea5e955, transparent 30%),
        radial-gradient(circle at bottom left, #9333ea55, transparent 30%),
        #0f172a;

      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    .login-box {
      width: 90%;
      max-width: 430px;
      background: rgba(17, 24, 39, 0.9);
      padding: 45px;
      border-radius: 30px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, .08);
      backdrop-filter: blur(15px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, .5);

      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      font-size: 70px;
      margin-bottom: 15px;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 10px;
      font-size: 38px;
      font-weight: 900;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 35px;
      font-size: 16px;
    }

    .input-box {
      position: relative;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #1e293b;
      color: white;
      font-size: 16px;
      outline: none;
      transition: .3s;
    }

    input:focus {
      border: 1px solid #38bdf8;
      box-shadow: 0 0 15px rgba(56, 189, 248, .3);
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #38bdf8;
      color: black;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: .4s;
    }

    button:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 25px rgba(56, 189, 248, .4);
    }

    .back {
      display: inline-block;
      margin-top: 25px;
      text-decoration: none;
      color: #cbd5e1;
      transition: .3s;
    }

    .back:hover {
      color: #38bdf8;
    }

    @media(max-width:768px) {

      .login-box {
        padding: 35px 25px;
      }

      h1 {
        font-size: 30px;
      }

      .icon {
        font-size: 55px;
      }
    }
  </style>

</head>

<body>

  <div class="login-box">

    <div class="icon">
      🎓
    </div>

    <h1>
      دخول الطالب
    </h1>

    <p class="subtitle">
      قم بتسجيل الدخول للوصول إلى نظام المكتبة
    </p>

    <div class="input-box">
      <input type="text" placeholder="رقم الطالب">
    </div>

    <div class="input-box">
      <input type="password" placeholder="كلمة المرور">
    </div>

    <button>
      تسجيل الدخول
    </button>

    <a href="index.html" class="back">
      ← العودة للصفحة الرئيسية
    </a>

  </div>

</body>

</html>
